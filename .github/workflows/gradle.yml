name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          # Linux x64 configuration
          - os: linux
            arch: x64
            runner: ubuntu-latest
            gradle_setup: false
            artifact_paths: build/libs/TileLoggerPacked.jar
          # Linux ARM configuration
          - os: linux
            arch: arm
            runner: ubuntu-20.04-arm
            gradle_setup: false
            artifact_paths: build/libs/TileLoggerPacked.jar
          # Windows x64 configuration
          - os: windows
            arch: x64
            runner: windows-latest
            gradle_setup: true
            artifact_paths: |
              build/libs/${{ github.event.repository.name }}.jar

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build project
        run: |
          git submodule update --remote
          ./gradlew build
          ./gradlew packLibToJar

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.artifact_paths }}
